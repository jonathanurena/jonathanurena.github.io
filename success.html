<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're on the list | Fiinly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #FAF7F2;
  color: #1A1714;
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  line-height: 1.75;
  overflow: hidden; /* Prevents scroll on success splash */
}

.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 32px;
  position: relative;
}

.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 70% 60% at 50% 40%, #EDD9B8 0%, transparent 70%);
  opacity: 0.6;
  pointer-events: none;
}

/* Success Icon */
.success-check {
  width: 64px;
  height: 64px;
  margin-bottom: 32px;
  opacity: 0;
  animation: fadeUp 0.8s ease forwards 0.2s;
  position: relative;
}

.success-check svg {
  width: 100%;
  height: 100%;
  stroke: #C9963A;
  stroke-width: 1.5;
  fill: none;
}

.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(40px, 6vw, 72px);
  font-weight: 700;
  line-height: 1.1;
  color: #1A1714;
  margin-bottom: 16px;
  opacity: 0;
  animation: fadeUp 0.8s ease forwards 0.4s;
  position: relative;
}

.hero-title em {
  font-style: italic;
  color: #6B4F3A;
}

.hero-subtitle {
  max-width: 500px;
  font-family: 'DM Sans', sans-serif;
  font-size: clamp(16px, 2vw, 19px);
  color: #8C7B6E;
  margin-bottom: 48px;
  opacity: 0;
  animation: fadeUp 0.8s ease forwards 0.6s;
  position: relative;
}

.back-btn {
  display: inline-block;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #6B4F3A;
  border: 1px solid #C9963A;
  padding: 14px 28px;
  text-decoration: none;
  background: transparent;
  transition: all 0.3s ease;
  border-radius: 50px;
  opacity: 0;
  animation: fadeUp 0.8s ease forwards 0.8s;
  position: relative;
}

.back-btn:hover {
  background: #C9963A;
  color: #FAF7F2;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

footer {
  position: absolute;
  bottom: 40px;
  width: 100%;
  text-align: center;
  font-size: 11px;
  color: #8C7B6E;
  letter-spacing: 0.05em;
}
</style>
</head>
<body>

<section class="hero">
  <div class="success-check">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="10" />
      <path d="M8 12L11 15L16 9" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <h1 class="hero-title">You’re <em>on the list.</em></h1>
  <p class="hero-subtitle">Thank you for joining the Fiinly waitlist. We’ll reach out as soon as we’re ready to help you take control of your journey.</p>
  
  <a href="index.html" class="back-btn">Return Home</a>
</section>

<footer>
  &copy; 2026 Ureña Studios. All rights reserved.
</footer>

</body>
</html>
